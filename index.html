                question: 'Cho bài toán: "Kiểm tra xem số K có trong danh sách A hay không". Cú pháp nào là tối ưu và chuẩn Python nhất?',
                options: ['for i in range(len(A)): if A[i] == K...', 'if K in A: print("Có")', 'if A contains K: print("Có")', 'while K == A: ...'],
                correct: 1,
                hint: 'Sức mạnh của Python: Không cần dùng vòng lặp for rườm rà để tìm kiếm. Toán tử "in" giải quyết mọi thứ chỉ trong 1 dòng.',
                code: true
            },
            {
                id: 40, type: 'Bài toán', lesson: 'Bài 21',
                question: 'Vòng lặp while sau sẽ lặp bao nhiêu lần?\ni = 10\nwhile i > 0:\n    i = i - 3',
                options: ['2 lần', '3 lần', '4 lần', 'Vô hạn lần'],
                correct: 2,
                hint: 'Chạy thử bằng tay: Lần 1: i=10 (đúng), i giảm còn 7. Lần 2: i=7 (đúng), giảm còn 4. Lần 3: i=4 (đúng), giảm còn 1. Lần 4: i=1 (đúng), giảm còn -2. Lần 5: i=-2 (Sai, dừng). Vậy lặp 4 lần.',
                code: true
            }
        ];

        // Component Icon Bóng đèn (Lucide React thay thế bằng SVG thô cho an toàn)
        const LightBulbIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-yellow-500">
                <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/>
                <path d="M9 18h6"/>
                <path d="M10 22h4"/>
            </svg>
        );

        const App = () => {
            const [answers, setAnswers] = useState({});
            const [showHints, setShowHints] = useState({});
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [score, setScore] = useState(0);

            const handleSelectOption = (qId, optionIndex) => {
                if(isSubmitted) return;
                setAnswers(prev => ({ ...prev, [qId]: optionIndex }));
            };

            const toggleHint = (qId) => {
                setShowHints(prev => ({ ...prev, [qId]: !prev[qId] }));
            };

            const handleSubmit = () => {
                let currentScore = 0;
                questions.forEach(q => {
                    if (answers[q.id] === q.correct) {
                        currentScore++;
                    }
                });
                setScore(currentScore);
                setIsSubmitted(true);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const getCategoryColor = (type) => {
                if (type === 'Lý thuyết') return 'bg-blue-100 text-blue-800';
                if (type === 'Tư duy') return 'bg-purple-100 text-purple-800';
                return 'bg-red-100 text-red-800'; // Bài toán
            }

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <header className="bg-white shadow-sm sticky-nav border-b-4 border-blue-500">
                        <div className="max-w-4xl mx-auto py-6 px-4 sm:px-6 lg:px-8 flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-bold text-gray-900">Trắc Nghiệm Python 10</h1>
                                <p className="text-sm text-gray-500 mt-1">Giữa Kỳ 2 (Bài 18 - 23) • 40 Câu hỏi</p>
                            </div>
                            <div className="text-right">
                                <span className="inline-block bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full font-semibold">Đã làm: {Object.keys(answers).length}/40</span>
                            </div>
                        </div>
                    </header>

                    {/* Result Banner */}
                    {isSubmitted && (
                        <div className="max-w-4xl mx-auto mt-6 px-4">
                            <div className="bg-green-100 border-l-4 border-green-500 text-green-700 p-6 rounded shadow-md">
                                <h2 className="text-2xl font-bold mb-2">Hoàn thành bài thi!</h2>
                                <p className="text-lg">Điểm của bạn: <span className="font-bold text-2xl">{score}/40</span> ({(score/40 * 10).toFixed(1)} điểm)</p>
                                <p className="mt-2 text-sm">
                                    {score >= 35 ? 'Tuyệt vời! Bạn nắm cực chắc kiến thức Python.' :
                                     score >= 25 ? 'Khá tốt! Tuy nhiên hãy xem lại các phần lý thuyết hoặc tư duy còn sai sót nhé.' :
                                     'Đừng nản chí! Đọc kỹ phần gợi ý (bóng đèn) để hiểu sâu hơn bản chất code nhé.'}
                                </p>
                            </div>
                        </div>
                    )}

                    {/* Quiz Container */}
                    <main className="max-w-4xl mx-auto mt-8 px-4 space-y-6">
                        {questions.map((q, index) => {
                            const isAnswered = answers[q.id] !== undefined;
                            const isCorrect = isSubmitted && answers[q.id] === q.correct;
                            const isWrong = isSubmitted && answers[q.id] !== q.correct;

                            return (
                                <div key={q.id} className={`bg-white rounded-xl shadow-md overflow-hidden border-2 smooth-transition ${isSubmitted ? (isCorrect ? 'border-green-400' : 'border-red-400') : 'border-transparent hover:border-blue-200'}`}>
                                    <div className="p-6">
                                        <div className="flex justify-between items-start mb-4">
                                            <div className="flex gap-2 items-center">
                                                <span className="bg-gray-800 text-white text-sm font-bold w-8 h-8 rounded-full flex items-center justify-center">
                                                    {index + 1}
                                                </span>
                                                <span className={`text-xs px-2 py-1 rounded-full font-semibold ${getCategoryColor(q.type)}`}>
                                                    {q.type} - {q.lesson}
                                                </span>
                                            </div>
                                            
                                            {/* Nút Bóng đèn */}
                                            <button 
                                                onClick={() => toggleHint(q.id)}
                                                className="flex items-center gap-1 text-sm bg-yellow-50 hover:bg-yellow-100 text-yellow-700 px-3 py-1.5 rounded-full border border-yellow-200 transition-colors"
                                                title="Mẹo tư duy / Hướng dẫn"
                                            >
                                                <LightBulbIcon /> {showHints[q.id] ? 'Đóng' : 'Gợi ý'}
                                            </button>
                                        </div>

                                        <div className="mb-4 text-gray-800 font-medium text-lg whitespace-pre-wrap">
                                            {q.code ? q.question.split('\n')[0] : q.question}
                                        </div>

                                        {q.code && (
                                            <pre className="text-sm mb-4"><code>{q.question.substring(q.question.indexOf('\n') + 1)}</code></pre>
                                        )}

                                        {/* Gợi ý bật lên */}
                                        {showHints[q.id] && (
                                            <div className="mb-4 bg-yellow-50 border-l-4 border-yellow-400 text-yellow-800 p-3 rounded-r text-sm font-medium animate-fade-in">
                                                {q.hint}
                                            </div>
                                        )}

                                        <div className="space-y-2">
                                            {q.options.map((option, optIdx) => {
                                                const isSelected = answers[q.id] === optIdx;
                                                
                                                let optionClass = "w-full text-left px-4 py-3 rounded-lg border-2 transition-colors duration-200 cursor-pointer text-gray-700 ";
                                                
                                                if (isSubmitted) {
                                                    if (optIdx === q.correct) {
                                                        optionClass += "bg-green-100 border-green-500 font-bold"; // Đáp án đúng
                                                    } else if (isSelected && optIdx !== q.correct) {
                                                        optionClass += "bg-red-100 border-red-500"; // Đáp án sai mà user chọn
                                                    } else {
                                                        optionClass += "border-gray-200 opacity-50"; // Các đáp án khác
                                                    }
                                                } else {
                                                    if (isSelected) {
                                                        optionClass += "bg-blue-50 border-blue-500 font-medium";
                                                    } else {
                                                        optionClass += "bg-gray-50 border-gray-200 hover:bg-gray-100 hover:border-gray-300";
                                                    }
                                                }

                                                return (
                                                    <button 
                                                        key={optIdx} 
                                                        onClick={() => handleSelectOption(q.id, optIdx)}
                                                        disabled={isSubmitted}
                                                        className={optionClass}
                                                    >
                                                        <span className="inline-block w-6 font-bold text-gray-500 mr-2">
                                                            {String.fromCharCode(65 + optIdx)}.
                                                        </span>
                                                        {option}
                                                    </button>
                                                )
                                            })}
                                        </div>
                                    </div>
                                </div>
                            );
                        })}

                        {/* Submit Button */}
                        <div className="pt-6 pb-12 flex justify-center">
                            {!isSubmitted ? (
                                <button 
                                    onClick={handleSubmit}
                                    className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-12 rounded-full shadow-lg text-lg transform transition hover:-translate-y-1"
                                >
                                    Nộp Bài Lấy Điểm
                                </button>
                            ) : (
                                <button 
                                    onClick={() => window.location.reload()}
                                    className="bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-12 rounded-full shadow-lg text-lg"
                                >
                                    Làm Lại Từ Đầu
                                </button>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
